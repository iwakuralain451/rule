; [规则集定义 - 严格按照最高效的先后顺序排列]

; 1. 最高优先级：广告与隐私拦截 (尽早阻断，极致节省 CPU 和带宽)
ruleset=🛑 广告拦截,[]GEOSITE,category-ads-all

; 2. 次高优先级：局域网防回环 (防内网流量走代理)
ruleset=🎯 全球直连,[]GEOIP,LAN,no-resolve

; 3. 自定义高优规则 (你的专属直连与特殊业务)
ruleset=🎯 全球直连,https://raw.githubusercontent.com/iwakuralain451/rule/refs/heads/main/direct.ini
ruleset=Gemini,https://raw.githubusercontent.com/iwakuralain451/rule/refs/heads/main/Gemini.ini
ruleset=Spotify,[]GEOSITE,spotify
ruleset=🎯 GoogleFCM,[]GEOSITE,google-fcm

; 4. 节点服务与基础微软/谷歌服务
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🎞️ Microsoft,[]GEOSITE,microsoft
ruleset=🍀 Google,[]GEOSITE,google
ruleset=💧 Copilot,[]GEOSITE,github
ruleset=🐬 OneDrive,[]GEOSITE,onedrive

; 5. 核心流媒体与社交应用
; [优化] 引入 GEOIP,telegram,no-resolve，完美覆盖 TG 的硬编码 IP，防止走漏网之鱼
ruleset=📲 Telegram,[]GEOSITE,telegram
ruleset=📲 Telegram,[]GEOIP,telegram,no-resolve
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎵 TikTok,[]GEOSITE,tiktok

; 6. 广域海外规则 (覆盖所有其他海外网站)
ruleset=🌍 国外媒体,[]GEOSITE,geolocation-!cn
ruleset=🚀 节点选择,[]GEOSITE,gfw

; 7. 广域国内规则与 IP 兜底 (放最后，因为 IP 匹配最耗时)
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; 8. 终极兜底
ruleset=🐟 漏网之鱼,[]FINAL


; [策略组定义]

; ========== 第 2 层：地区自动测速分组 (过滤掉“免费”节点) ==========
custom_proxy_group=♻️ 全球自动`url-test`^(?!.*(测试|俄罗斯|缅甸|越南|南极|下载专用|\\[|免费)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇭🇰 HK 自动`url-test`^(?=.*(香港|HK|Hong Kong))(?!.*(\\[|免费)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇯🇵 JP 自动`url-test`^(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))(?!.*(\\[|下载专用|免费)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇺🇸 US 自动`url-test`^(?=.*(美|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|United States|(?<![a-zA-Z])US(?![a-zA-Z])|(?<![a-zA-Z])USA(?![a-zA-Z])|(?<![a-zA-Z])USD(?![a-zA-Z])))(?!.*(\\[|免费)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇸🇬 SG 自动`url-test`^(?=.*(新加坡|坡|狮城|SG|Singapore))(?!.*(\\[|免费)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇹🇼 TW 自动`url-test`^(?=.*(台|新北|彰化|TW|Taiwan))(?!.*(\\[|免费)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇰🇷 KR 自动`url-test`^(?=.*(KR|Korea|KOR|首尔|韩|韓))(?!.*(\\[|免费)).*$`https://www.gstatic.com/generate_204`300,5,50

; 全量节点池（供下方的手动直选使用）
custom_proxy_group=🐸 手动切换`select`^(?!.*免费).*$


