; =========================================
; 终极纯净分组 rule4.ini (环境变量降维打击版)
; =========================================

; [规则集定义 - 严查 DNS 泄露版，无隐私防护冗余]
ruleset=🛑 广告拦截,[]GEOSITE,category-ads-all
ruleset=🎯 全球直连,[]GEOIP,LAN,no-resolve
ruleset=🎯 全球直连,https://raw.githubusercontent.com/iwakuralain451/rule/refs/heads/main/direct.ini
ruleset=Gemini,https://raw.githubusercontent.com/iwakuralain451/rule/refs/heads/main/Gemini.ini
ruleset=Spotify,[]GEOSITE,spotify
ruleset=🎯 GoogleFCM,[]DOMAIN-SUFFIX,mtalk.google.com
ruleset=🎯 GoogleFCM,[]DOMAIN-KEYWORD,mtalk.google
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🎞️ Microsoft,[]GEOSITE,microsoft
ruleset=🍀 Google,[]GEOSITE,google
ruleset=💧 Copilot,[]GEOSITE,github
ruleset=🐬 OneDrive,[]GEOSITE,onedrive
ruleset=📲 Telegram,[]GEOSITE,telegram
ruleset=📲 Telegram,[]GEOIP,telegram,no-resolve
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🌍 国外媒体,[]GEOSITE,geolocation-!cn
ruleset=🚀 节点选择,[]GEOSITE,gfw
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL

; [策略组定义]
; ========== 第 1 层：核心业务逻辑层 ==========

custom_proxy_group=🚀 节点选择`select`[]♻️ 全球自动`[]🐸 手动切换`[]🐷 廉价备用`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT

; ========== 第 2 层：专属控制与备用收容层 ==========
; 【全局手动中心】
custom_proxy_group=🐸 手动切换`select`[]♻️ 全球自动`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT`.*


; 【谷歌统管中心】：末尾的 .* 代表在下面列出所有真实节点（不含被抹杀的垃圾节点）
custom_proxy_group=🇬 谷歌专属`select`[]🚀 节点选择`[]♻️ 全球自动`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT`.*


; 【廉价收容所】：专门提取以 "[" 开头的节点，以备不时之需
custom_proxy_group=🐷 廉价备用`select`^\[.*$


; 谷歌系 (统一听从 🇬 谷歌专属)
custom_proxy_group=🎯 GoogleFCM`select`[]🇬 谷歌专属`[]🚀 节点选择`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]DIRECT
custom_proxy_group=Gemini`select`[]🇬 谷歌专属`[]🇺🇸 US 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]🚀 节点选择`[]DIRECT
custom_proxy_group=🍀 Google`select`[]🇬 谷歌专属`[]🚀 节点选择`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=📹 YouTube`select`[]🇬 谷歌专属`[]🚀 节点选择`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT

; 其他业务
custom_proxy_group=Spotify`select`[]🚀 节点选择`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=🎞️ Microsoft`select`[]🚀 节点选择`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=💧 Copilot`select`[]🚀 节点选择`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=🐬 OneDrive`select`[]🚀 节点选择`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]🐸 手动切换`[]🇸🇬 SG 自动`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇺🇸 US 自动`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]🚀 节点选择`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 全球自动`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT



; ========== 第 3 层：自动测速池 (极简版) ==========
; 因为上面已经用 exclude_remarks 把垃圾节点删了，这里正则变得极度清爽：
; ^(?!\[) 的意思是：只要不是以 "[" 开头的，通通抓进来测速！
custom_proxy_group=♻️ 全球自动`url-test`^(?!\[)(?!.*(测试|俄罗斯|缅甸|越南|南极|下载专用)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇭🇰 HK 自动`url-test`^(?!\[)(?=.*(香港|HK|Hong Kong))(?!.*下载专用).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇯🇵 JP 自动`url-test`^(?!\[)(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))(?!.*下载专用).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇺🇸 US 自动`url-test`^(?!\[)(?=.*(美|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|United States|(?<![a-zA-Z])US(?![a-zA-Z])|(?<![a-zA-Z])USA(?![a-zA-Z])|(?<![a-zA-Z])USD(?![a-zA-Z])))(?!.*下载专用).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇸🇬 SG 自动`url-test`^(?!\[)(?=.*(新加坡|坡|狮城|SG|Singapore))(?!.*下载专用).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇹🇼 TW 自动`url-test`^(?!\[)(?=.*(台|新北|彰化|TW|Taiwan))(?!.*下载专用).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇰🇷 KR 自动`url-test`^(?!\[)(?=.*(KR|Korea|KOR|首尔|韩|韓))(?!.*下载专用).*$`https://www.gstatic.com/generate_204`300,5,50






; 防护与直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]🐸 手动切换
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT


; [配置文件环境设置]
enable_rule_generator=true
overwrite_original_rules=true

; ⬇️ [新增神级设置]：在订阅转换阶段，直接把带这些字眼的垃圾节点彻底抹杀，根本不进路由器内存！
exclude_remarks=(?i)(免费|距离下次重置|如果看不到节点|套餐到期|官网|更新订阅|剩余流量)

; ⬇️ [新增安全设置]：强制开启节点 UDP 支持，保障你的 STUN/WebRTC 穿透成功率
udp_support=true
