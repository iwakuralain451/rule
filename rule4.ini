ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL


; [策略组定义]

; ========== 第 3 层：自动测速池 (严苛过滤) ==========
; 核心逻辑：^(?!\[) 拒绝任何以 "[" 开头的廉价节点进入！同时屏蔽垃圾提示字符。
custom_proxy_group=♻️ 全球自动`url-test`^(?!\[)(?!.*(测试|俄罗斯|缅甸|越南|南极|下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇭🇰 HK 自动`url-test`^(?!\[)(?=.*(香港|HK|Hong Kong))(?!.*(下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇯🇵 JP 自动`url-test`^(?!\[)(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))(?!.*(下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇺🇸 US 自动`url-test`^(?!\[)(?=.*(美|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|United States|(?<![a-zA-Z])US(?![a-zA-Z])|(?<![a-zA-Z])USA(?![a-zA-Z])|(?<![a-zA-Z])USD(?![a-zA-Z])))(?!.*(下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇸🇬 SG 自动`url-test`^(?!\[)(?=.*(新加坡|坡|狮城|SG|Singapore))(?!.*(下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇹🇼 TW 自动`url-test`^(?!\[)(?=.*(台|新北|彰化|TW|Taiwan))(?!.*(下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🇰🇷 KR 自动`url-test`^(?!\[)(?=.*(KR|Korea|KOR|首尔|韩|韓))(?!.*(下载专用|免费|距离下次重置|如果看不到节点)).*$`https://www.gstatic.com/generate_204`300,5,50

; ========== 第 2 层：专属与手动控制层 ==========

; 【谷歌统管中心】：包含所有节点，用于统一指定谷歌系业务
custom_proxy_group=🇬 谷歌专属`select`[]🚀 节点选择`[]♻️ 全球自动`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT`^(?!.*(免费|距离下次重置|如果看不到节点)).*$

; 【全局手动中心】：[已修复死循环] 删除了里面的 `🚀 节点选择`，只包含底层测速组和全量真实节点！
custom_proxy_group=🐸 手动切换`select`[]♻️ 全球自动`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]DIRECT`^(?!.*(免费|距离下次重置|如果看不到节点)).*$

; 【廉价收容所】：专门提取以 "[" 开头的节点，以备不时之需
custom_proxy_group=🐷 廉价备用`select`^\[(?!.*(免费|距离下次重置|如果看不到节点)).*$


; ========== 第 1 层：核心业务逻辑层 (纯净引用，再无冗余节点列表) ==========

; 主力入口
custom_proxy_group=🚀 节点选择`select`[]♻️ 全球自动`[]🐸 手动切换`[]🇭🇰 HK 自动`[]🇯🇵 JP 自动`[]🇸🇬 SG 自动`[]🇺🇸 US 自动`[]🇹🇼 TW 自动`[]🇰🇷 KR 自动`[]🐷 廉价备用`[]DIRECT

